<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egyptian English Academy - Learn A1 English in Egyptian Arabic</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Master A1 English with Egyptian Arabic explanations! Interactive exercises for listening, speaking, reading, writing, flashcards, and quizzes. Start learning now!">
  <meta name="keywords" content="Learn English, A1 English, Egyptian Arabic, English Grammar, English Speaking Practice, English Flashcards, Static Web App">
  <meta name="author" content="Egyptian English Academy">
  <link rel="icon" type="image/png" href="icon/logo.png">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/roadmap.css">
  <link rel="stylesheet" href="css/lessons.css">
  <link rel="stylesheet" href="css/practice.css">
  <link rel="stylesheet" href="css/quizzes.css">
  <link rel="stylesheet" href="css/flashcards.css">
  <link rel="stylesheet" href="css/certificate.css">
</head>
<body>

  <!-- App Wrapper -->
  <div class="app-container">

    <!-- Mobile Responsive Header -->
    <header class="mobile-header">
      <button class="menu-toggle-btn" id="mobile-menu-toggle" aria-label="Toggle menu">☰</button>
      <div class="brand brand-mobile-adjust">
        <img class="brand-logo-img" src="icon/logo.png" alt="EE Academy Logo">
        <h1 class="brand-name">EE Academy</h1>
      </div>
      <div class="header-spacer"></div> <!-- Spacer to center title -->
    </header>

    <!-- Sidebar Navigation -->
    <nav class="sidebar" aria-label="Main Navigation">
      <div class="brand">
        <img class="brand-logo-img" src="icon/logo.png" alt="EE Academy Logo">
        <h1 class="brand-name">EE Academy</h1>
      </div>

      <!-- User Progress HUD -->
      <div class="user-profile">
        <div class="user-info">
          <div class="user-avatar" id="user-hud-avatar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
          <div class="user-name-wrapper">
            <div class="user-title" id="user-hud-name">Student</div>
            <div class="user-level" id="user-hud-rank">A1 Beginner</div>
          </div>
        </div>
        <div class="xp-progress">
          <div class="xp-header">
            <span>Academy Progress</span>
            <span id="user-hud-xp-text" class="xp-text-highlight">0 / 10 Lessons</span>
          </div>
          <div class="xp-bar">
            <div class="xp-fill" id="user-hud-xp-fill"></div>
          </div>
          <div class="xp-header" style="margin-top: 8px; font-size: 0.75rem; color: var(--text-muted);">
            <span>Level <strong id="user-hud-level-num">1</strong></span>
            <span id="user-hud-total-xp">0 XP Total</span>
          </div>
        </div>
      </div>

      <!-- Navigation Links -->
      <ul class="nav-links">
        <li class="nav-item">
          <a href="#dashboard" class="nav-link active">
            <span class="nav-icon">
              <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
            </span>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#roadmap" class="nav-link">
            <span class="nav-icon">
              <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
            </span>
            <span>Study Roadmap</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#vocab-center" class="nav-link">
            <span class="nav-icon">
              <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
            </span>
            <span>Vocabulary Center</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#review-center" class="nav-link">
            <span class="nav-icon">
              <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </span>
            <span>Daily Review</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#dictionary" class="nav-link">
            <span class="nav-icon">
              <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            </span>
            <span>Dictionary</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#final-test" class="nav-link">
            <span class="nav-icon">
              <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg>
            </span>
            <span>Mastery Exam</span>
          </a>
        </li>
      </ul>

      <!-- Bottom Settings -->
      <div class="sidebar-footer-settings">
        
        <!-- Speech Rate Controller -->
        <div class="speech-rate-control">
          <div class="speech-rate-control-header">
            <span>Voice Speed:</span>
            <span id="speech-rate-val">0.85x</span>
          </div>
          <input type="range" id="speech-rate-slider" min="0.5" max="1.5" step="0.05" value="0.85" class="speech-rate-slider-input">
        </div>
        
        <!-- SFX Toggle -->
        <button id="sfx-toggle" class="theme-toggle-btn sidebar-btn-full">
          <svg class="sidebar-btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
          <span id="sfx-toggle-text">SFX: On</span>
        </button>

        <!-- Theme Toggle -->
        <button id="theme-toggle" class="theme-toggle-btn sidebar-btn-full">
          <svg class="sidebar-btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <span id="theme-toggle-text">Light Mode</span>
        </button>

        <!-- Reset Progress -->
        <button onclick="window.resetAcademyProgress()" class="theme-toggle-btn sidebar-btn-danger">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          <span>Reset Progress</span>
        </button>
      </div>
    </nav>

    <!-- Main Content Panels Window -->
    <main class="main-content" id="main-content-panels" aria-label="Main Content Area">
      
      <!-- 1. Dashboard Page Panel -->
      <section id="dashboard-section" class="content-section active" aria-labelledby="dashboard-header"></section>
      
      <!-- 2. Study Roadmap Page Panel -->
      <section id="roadmap-section" class="content-section" aria-labelledby="roadmap-header"></section>

      <!-- 3. Lesson Detail Viewer Page Panel -->
      <section id="lesson-viewer-section" class="content-section" aria-labelledby="lesson-header"></section>

      <!-- 4. Vocabulary Center Page Panel -->
      <section id="vocab-center-section" class="content-section" aria-labelledby="vocab-center-header"></section>

      <!-- 5. Final Exam and Graduation Certificate Panel -->
      <section id="final-test-section" class="content-section" aria-labelledby="exam-header"></section>

      <!-- 6. Searchable Vocabulary Dictionary Panel -->
      <section id="dictionary-section" class="content-section" aria-labelledby="dictionary-header"></section>

      <!-- 7. Smart Daily Review Panel -->
      <section id="review-center-section" class="content-section" aria-labelledby="review-center-header"></section>

    </main>

  </div>

  <!-- Core JavaScript Injection -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
